deep-remove-regex:
- "/java-common-protos/grpc-google-.*/src"
- "/java-common-protos/proto-google-.*/src"
- "/java-common-protos/google-.*/src"
- "/java-common-protos/samples/snippets/generated"

deep-preserve-regex:
- "/java-common-protos/google-.*/src/test/java/com/google/cloud/.*/v.*/it/IT.*Test.java"
- "/.*google-.*/src/main/java/.*/stub/Version.java"

deep-copy-regex:
- source: "/google/apps/card/(v.*)/.*-java/proto-google-.*/src"
  dest: "/owl-bot-staging/java-common-protos/$1/proto-proto-google-common-protos-$1/src"
- source: "/google/apps/card/(v.*)/.*-java/grpc-google-.*/src"
  dest: "/owl-bot-staging/java-common-protos/$1/grpc-proto-google-common-protos-$1/src"
- source: "/google/apps/card/(v.*)/.*-java/gapic-google-.*/src"
  dest: "/owl-bot-staging/java-common-protos/$1/proto-google-common-protos/src"
- source: "/google/apps/card/(v.*)/.*-java/samples/snippets/generated"
  dest: "/owl-bot-staging/java-common-protos/$1/samples/snippets/generated"

api-name: common-protos