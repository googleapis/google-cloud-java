syntax = "proto3";

package google.ads.admanager.v1;

import "google/ads/admanager/v1/label_enums.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "LabelMessagesProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// A Label is additional information that can be added to an entity.
message Label {
  option (google.api.resource) = {
    type: "admanager.googleapis.com/Label"
    pattern: "networks/{network_code}/labels/{label}"
    plural: "labels"
    singular: "label"
  };

  // Identifier. The resource name of the `Label`.
  // Format: `networks/{network_code}/labels/{label_id}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. Display name of the Label. This attribute has a maximum length of
  // 127 characters.
  optional string display_name = 3 [(google.api.field_behavior) = REQUIRED];

  // Optional. A description of the label. This attribute has a maximum length
  // of 255 characters.
  optional string description = 4 [(google.api.field_behavior) = OPTIONAL];

  // Output only. Specifies whether or not the label is active.
  optional bool active = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Required. Unordered list. The types of the Label.
  repeated LabelTypeEnum.LabelType types = 7 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = UNORDERED_LIST
  ];
}
