syntax = "proto3";

package google.ads.admanager.v1;

import "google/ads/admanager/v1/linked_device_enums.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "LinkedDeviceMessagesProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// A test mobile device that is linked to the network. Can be used to preview a
// creative within a mobile application.
message LinkedDevice {
  option (google.api.resource) = {
    type: "admanager.googleapis.com/LinkedDevice"
    pattern: "networks/{network_code}/linkedDevices/{linked_device}"
    plural: "linkedDevices"
    singular: "linkedDevice"
  };

  // Identifier. The resource name of the `LinkedDevice`.
  // Format: `networks/{network_code}/linkedDevices/{linked_device_id}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. The display name of the LinkedDevice.
  optional string display_name = 2 [(google.api.field_behavior) = REQUIRED];

  // Output only. The user who owns this device linking.
  // Format: `networks/{network_code}/users/{user}`
  optional string owner = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = { type: "admanager.googleapis.com/User" }
  ];

  // Optional. The visibility of the device.
  optional LinkedDeviceVisibilityEnum.LinkedDeviceVisibility visibility = 9
      [(google.api.field_behavior) = OPTIONAL];
}
