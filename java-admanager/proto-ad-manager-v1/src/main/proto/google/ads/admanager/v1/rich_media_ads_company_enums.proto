syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "RichMediaAdsCompanyEnumsProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [RichMediaAdsCompanyGdprStatus][google.ads.admanager.v1.RichMediaAdsCompanyGdprStatusEnum.RichMediaAdsCompanyGdprStatus]
message RichMediaAdsCompanyGdprStatusEnum {
  // The status of a RichMediaAdsCompany for use in a GdprProtection.
  enum RichMediaAdsCompanyGdprStatus {
    // Default value. This value is unused.
    RICH_MEDIA_ADS_COMPANY_GDPR_STATUS_UNSPECIFIED = 0;

    // The company has not been contacted or responded about GDPR compliance, or
    // otherwise the GDPR compliance is undetermined.
    COMPLIANCE_UNKNOWN = 1;

    // The company has been determined as compliant for GDPR.
    COMPLIANT = 2;

    // The company has been determined as compliant, and is part of the
    // default set of companies eligible as a vendor.
    COMPLIANT_AND_DEFAULT = 3;

    // The company has been determined to be compliant through certification
    // process.
    COMPLIANT_LIGHTWEIGHT_VERIFIED = 4;

    // The company has been determined as non-compliant for GDPR.
    NOT_COMPLIANT = 5;
  }
}
