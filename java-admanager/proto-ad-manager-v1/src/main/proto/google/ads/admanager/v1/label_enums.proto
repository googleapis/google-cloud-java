syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "LabelEnumsProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [LabelType][google.ads.admanager.v1.LabelTypeEnum.LabelType]
message LabelTypeEnum {
  // Represents the types of labels supported.
  enum LabelType {
    // Default value. This value is unused.
    LABEL_TYPE_UNSPECIFIED = 0;

    // Allows for the creation of labels to exclude ads from showing against a
    // tag that specifies the label as an exclusion.
    AD_EXCLUSION = 1;

    // Allows for the creation of limits on the frequency that a user sees a
    // particular type of creative over a portion of the inventory.
    AD_UNIT_FREQUENCY_CAP = 2;

    // Allows for the creation of labels mapped to a Google canonical ad
    // category, which can be used for competitive exclusions and blocking
    // across Google systems.
    CANONICAL_CATEGORY = 3;

    // Allows for the creation of labels to exclude competing ads from showing
    // on the same page.
    COMPETITIVE_EXCLUSION = 4;

    // Allows for the creation of labels that can be used to force the wrapping
    // of a delivering creative with header/footer creatives.
    CREATIVE_WRAPPER = 5;
  }
}
