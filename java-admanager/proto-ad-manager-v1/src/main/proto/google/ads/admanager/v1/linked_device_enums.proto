syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "LinkedDeviceEnumsProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [LinkedDeviceVisibility][google.ads.admanager.v1.LinkedDeviceVisibilityEnum.LinkedDeviceVisibility]
message LinkedDeviceVisibilityEnum {
  // Represents the visibility of a LinkedDevice.
  enum LinkedDeviceVisibility {
    // Default value. This value is unused.
    LINKED_DEVICE_VISIBILITY_UNSPECIFIED = 0;

    // The linked device can only be used by the user who owns the device
    // linking.
    PRIVATE = 2;

    // The linked device can be used by anyone on the network.
    PUBLIC = 3;
  }
}
