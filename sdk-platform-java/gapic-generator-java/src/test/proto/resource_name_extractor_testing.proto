syntax = "proto3";

package google.cloud.bigquery.testing;

option java_multiple_files = true;
option java_outer_classname = "ResourceNameExtractorTestingOuterClass";
option java_package = "com.google.cloud.bigquery.testing";

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/resource.proto";

service ResourceNameExtractorTesting {
  option (google.api.default_host) = "extractor.googleapis.com";

  rpc GetFoo(GetFooRequest) returns (Foo) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/foos/*}"
    };
    option (google.api.method_signature) = "name";
  }

  rpc GetBar(GetBarRequest) returns (Bar) {
    option (google.api.http) = {
      get: "/v1/{bar=projects/*/locations/*/bars/*}"
    };
    option (google.api.method_signature) = "bar";
  }

  rpc GetHeuristic(GetHeuristicRequest) returns (Heuristic) {
    option (google.api.http) = {
      get: "/v1/projects/{project}/locations/{location}/heuristics/{heuristic}"
    };
  }

  rpc ListFoos(ListFoosRequest) returns (ListFoosResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/foos"
    };
    option (google.api.method_signature) = "parent";
  }

  // Exact AIP Method for populating known resources
  rpc Get(GetHeuristicWithNamedBindingRequest) returns (Heuristic) {
    option (google.api.http) = {
      get: "/v1/projects/{project}/locations/{location}/{parent_name=reservations/*/reservationBlocks/*/reservationSubBlocks/*}/heuristics/{heuristic}"
    };
  }

  rpc List(ListHeuristicsRequest) returns (ListHeuristicsResponse) {
    option (google.api.http) = {
      get: "/v1/projects/{project}/locations/{location}/heuristics"
    };
  }

  // Should NOT generate a heuristic, because it has a resource_reference field
  rpc GetHeuristicWithResourceReference(GetHeuristicWithResourceReferenceRequest) returns (Heuristic) {
    option (google.api.http) = {
      get: "/v1/projects/{project}/locations/{location}/heuristics/{heuristic}"
    };
  }


  rpc GetHeuristicWithNestedFields(GetHeuristicWithNestedFieldsRequest) returns (Heuristic) {
    option (google.api.http) = {
      get: "/v1/projects/{project}/locations/{location}/heuristics/{heuristic.name}"
    };
  }

  rpc GetHeuristicWithNamedBinding(GetHeuristicWithNamedBindingRequest) returns (Heuristic) {
    option (google.api.http) = {
      get: "/v1/projects/{project}/locations/{location}/{parent_name=reservations/*/reservationBlocks/*/reservationSubBlocks/*}/heuristics/{heuristic}"
    };
  }
}

message ListHeuristicsRequest {
  string project = 1;
  string location = 2;
}
message ListHeuristicsResponse {
  repeated Heuristic heuristics = 1;
}

message GetHeuristicWithResourceReferenceRequest {
  string project = 1;
  string location = 2;
  string heuristic = 3;
  string foo = 4 [
    (google.api.resource_reference) = {
      type: "extractor.googleapis.com/Foo"
    }
  ];
}


message Foo {
  option (google.api.resource) = {
    type: "extractor.googleapis.com/Foo"
    pattern: "projects/{project}/locations/{location}/foos/{foo}"
  };
  string name = 1;
}

message Bar {
  string name = 1;
}

message GetHeuristicRequest {
  string project = 1;
  string location = 2;
  string heuristic = 3;
}

message GetHeuristicWithNestedFieldsRequest {
  string project = 1;
  string location = 2;
  Heuristic heuristic = 3;
}

message GetHeuristicWithNamedBindingRequest {
  string project = 1;
  string location = 2;
  string parent_name = 3;
  string heuristic = 4;
}

message Heuristic {
  string name = 1;
}

message GetFooRequest {
  string name = 1 [
    (google.api.resource_reference) = {
      type: "extractor.googleapis.com/Foo"
    }
  ];
}

message GetBarRequest {
  string bar = 1;
}
message ListFoosRequest {
  string parent = 1 [
    (google.api.resource_reference) = {
      child_type: "extractor.googleapis.com/Foo"
    }
  ];
}

message ListFoosResponse {
  repeated Foo foos = 1;
}
