
# Whether or not rebase-merging is enabled on this repository.
# Defaults to `true`
rebaseMergeAllowed: false

# Whether or not squash-merging is enabled on this repository.
# Defaults to `true`
squashMergeAllowed: true

# Whether or not PRs are merged with a merge commit on this repository.
# Defaults to `false`
mergeCommitAllowed: false

# Rules for main branch protection
branchProtectionRules:
# Identifies the protection rule pattern. Name of the branch to be protected.
# Defaults to `main`
- pattern: main
  # Can admins overwrite branch protection.
  # Defaults to `true`
  isAdminEnforced: true
  # Number of approving reviews required to update matching branches.
  # Defaults to `1`
  requiredApprovingReviewCount: 1
  # Are reviews from code owners required to update matching branches.
  # Defaults to `false`
  requiresCodeOwnerReviews: true
  # Require up to date branches
  requiresStrictStatusChecks: false
  # List of required status check contexts that must pass for commits to be accepted to matching branches.
  requiredStatusCheckContexts:
    - "lint"
    - "clirr"
    - "units (8)"
    - "units (11)"
    - "Kokoro - Test: Integration"
    - "dependencies (11, java-bigquery)"
    - "dependencies (11, java-spanner)"
    - "dependencies (11, java-storage)"
    - "dependencies (11, java-pubsub)"
    - "flatten-plugin-check"
    - "build (8, java-bigquery, test)"
    - "build (8, java-bigquery, lint)"
    - "build (8, java-bigquery, clirr)"
    - "build (8, java-bigtable, javadoc)"
    - "build (11, java-bigquery, test)"
    - "build (11, java-bigquery, lint)"
    - "build (11, java-bigquery, clirr)"
    - "build (11, java-bigtable, javadoc)"
    - "javadoc-with-doclet (java-bigtable)"
    - "cla/google"
    - "graalvm-presubmit-shared-config-a (java-graalvm-ci-prod)"
    - "graalvm-presubmit-shared-config-b (java-graalvm-ci-prod)"
    - "Build with Airlock"
- pattern: java7
  # Can admins overwrite branch protection.
  # Defaults to `true`
  isAdminEnforced: true
  # Number of approving reviews required to update matching branches.
  # Defaults to `1`
  requiredApprovingReviewCount: 1
  # Are reviews from code owners required to update matching branches.
  # Defaults to `false`
  requiresCodeOwnerReviews: true
  # Require up to date branches
  requiresStrictStatusChecks: false
  # List of required status check contexts that must pass for commits to be accepted to matching branches.
  requiredStatusCheckContexts:
  - "dependencies (8)"
  - "dependencies (11)"
  - "lint"
  - "clirr"
  - "units (8)"
  - "units (11)"
  - "Kokoro - Test: Integration"
  - "cla/google"
# List of explicit permissions to add (additive only)
permissionRules:
- team: yoshi-admins
  permission: admin
- team: yoshi-java-admins
  permission: admin
- team: yoshi-java
  permission: push
