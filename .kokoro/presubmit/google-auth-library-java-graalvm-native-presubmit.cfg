# Format: //devtools/kokoro/config/proto/build.proto
env_vars: {
  key: "JOB_TYPE"
  value: "graalvm-single"
}

# TODO: remove this after we've migrated all tests and scripts
env_vars: {
  key: "GCLOUD_PROJECT"
  value: "gcloud-devel"
}

env_vars: {
  key: "GOOGLE_CLOUD_PROJECT"
  value: "gcloud-devel"
}

env_vars: {
  key: "GOOGLE_APPLICATION_CREDENTIALS"
  value: "secret_manager/java-it-service-account"
}

env_vars: {
  key: "SECRET_MANAGER_KEYS"
  value: "java-it-service-account"
}

env_vars: {
  key: "GCS_BUCKET"
  value: "byoid-it-bucket"
}

env_vars: {
  key: "GOOGLE_EXTERNAL_ACCOUNT_ALLOW_EXECUTABLES"
  value: "1"
}

env_vars: {
  key: "GOOGLE_CLOUD_QUOTA_PROJECT"
  value: "gcloud-devel"
}

# Configure the docker image for kokoro-trampoline.
env_vars: {
  key: "TRAMPOLINE_IMAGE"
  value: "gcr.io/cloud-devrel-public-resources/graalvm_sdk_platform_a:3.58.0"
}

env_vars: {
  key: "BUILD_SUBDIR"
  value: "google-auth-library-java"
}

env_vars: {
  key: "INTEGRATION_TEST_ARGS"
  value: "-Pslf4j2x"
}

