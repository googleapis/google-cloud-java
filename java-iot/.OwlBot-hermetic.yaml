deep-remove-regex:
- "/java-iot/samples/snippets/generated"
- "/java-iot/grpc-google-.*/src"
- "/java-iot/proto-google-.*/src"
- "/java-iot/google-.*/src/main"
- "/java-iot/google-.*/src/test/java/com/google/.*/v.*/.*ClientTest.java"
- "/java-iot/google-.*/src/test/java/com/google/.*/v.*/.*ClientHttpJsonTest.java"
- "/java-iot/google-.*/src/test/java/com/google/.*/v.*/Mock.*.java"

deep-preserve-regex:
- "/.*google-.*/src/main/java/.*/stub/Version.java"
- "/.*google-cloud-iot/src/test/java/com/google/[^/]+/iot/v1/it/ITSystemTest.java"

deep-copy-regex:
- source: "/google/cloud/iot/(v.*)/.*-java/proto-google-.*/src"
  dest: "/owl-bot-staging/java-iot/$1/proto-google-cloud-iot-$1/src"
- source: "/google/cloud/iot/(v.*)/.*-java/grpc-google-.*/src"
  dest: "/owl-bot-staging/java-iot/$1/grpc-google-cloud-iot-$1/src"
- source: "/google/cloud/iot/(v.*)/.*-java/gapic-google-.*/src/main"
  dest: "/owl-bot-staging/java-iot/$1/google-cloud-iot/src/main"
- source: "/google/cloud/iot/(v.*)/.*-java/samples/snippets/generated"
  dest: "/owl-bot-staging/java-iot/$1/samples/snippets/generated"

api-name: cloudiot
